<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <style>
    .rm{fill:#f3f7fb}
    .w{stroke:#33414f;stroke-width:6;fill:none;stroke-linejoin:miter}
    .iw{stroke:#33414f;stroke-width:3.5;fill:none;stroke-linecap:butt}
    .lab{fill:#3f4d59;font:600 12px Arial,sans-serif;text-anchor:middle}
    .sz{fill:#9aa7b3;font:500 9px Arial,sans-serif;text-anchor:middle}
    .ttl{fill:#33414f;font:700 12px Arial,sans-serif;letter-spacing:1.5px}
    .fur{fill:#e4ebf1;stroke:#c2ceda;stroke-width:1.5}
    .win{stroke:#5b8fc7;stroke-width:4}
    .door{stroke:#aebcc9;stroke-width:1.5;fill:none}
  </style>
  <rect width="480" height="340" fill="#ffffff"/>
  <rect class="rm" x="18" y="34" width="444" height="290"/>
  <rect class="w" x="18" y="34" width="444" height="290"/>
  <!-- interior walls -->
  <line class="iw" x1="270" y1="34" x2="270" y2="324"/>
  <line class="iw" x1="18" y1="124" x2="270" y2="124"/>
  <line class="iw" x1="270" y1="214" x2="462" y2="214"/>
  <!-- windows -->
  <line class="win" x1="18" y1="180" x2="18" y2="260"/>
  <line class="win" x1="120" y1="34" x2="200" y2="34"/>
  <line class="win" x1="462" y1="90" x2="462" y2="160"/>
  <line class="win" x1="462" y1="250" x2="462" y2="300"/>
  <!-- doors -->
  <path class="door" d="M150 124 a26 26 0 0 1 26 26"/>
  <path class="door" d="M270 174 a24 24 0 0 1 -24 -24"/>
  <path class="door" d="M320 214 a22 22 0 0 1 22 -22"/>
  <!-- kitchen -->
  <rect class="fur" x="28" y="44" width="160" height="16" rx="2"/>
  <rect class="fur" x="28" y="60" width="16" height="56" rx="2"/>
  <!-- living -->
  <rect class="fur" x="40" y="250" width="120" height="34" rx="4"/>
  <rect class="fur" x="186" y="248" width="46" height="26" rx="3"/>
  <circle class="fur" cx="150" cy="190" r="22"/>
  <!-- bedroom -->
  <rect class="fur" x="300" y="60" width="128" height="78" rx="4"/>
  <rect class="fur" x="306" y="64" width="54" height="16" rx="3"/>
  <rect class="fur" x="370" y="64" width="54" height="16" rx="3"/>
  <!-- bath -->
  <rect class="fur" x="300" y="262" width="84" height="40" rx="6"/>
  <circle class="fur" cx="430" cy="262" r="12"/>
  <!-- labels -->
  <text class="lab" x="108" y="88">Kitchen</text>
  <text class="lab" x="150" y="232">Living / Dining</text>
  <text class="sz" x="150" y="246">26.5 m²</text>
  <text class="lab" x="366" y="176">Bedroom</text>
  <text class="lab" x="345" y="252">Bath</text>
  <text class="ttl" x="18" y="24">1 BEDROOM</text>
</svg>
