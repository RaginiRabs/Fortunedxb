<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <style>
    .rm{fill:#f3f7fb}
    .w{stroke:#33414f;stroke-width:6;fill:none;stroke-linejoin:miter}
    .iw{stroke:#33414f;stroke-width:3.5;fill:none;stroke-linecap:butt}
    .lab{fill:#3f4d59;font:600 11px Arial,sans-serif;text-anchor:middle}
    .sz{fill:#9aa7b3;font:500 9px Arial,sans-serif;text-anchor:middle}
    .ttl{fill:#33414f;font:700 12px Arial,sans-serif;letter-spacing:1.5px}
    .fur{fill:#e4ebf1;stroke:#c2ceda;stroke-width:1.5}
    .win{stroke:#5b8fc7;stroke-width:4}
    .door{stroke:#aebcc9;stroke-width:1.5;fill:none}
  </style>
  <rect width="480" height="340" fill="#ffffff"/>
  <rect class="rm" x="18" y="34" width="444" height="290"/>
  <rect class="w" x="18" y="34" width="444" height="290"/>
  <!-- interior walls -->
  <line class="iw" x1="200" y1="34" x2="200" y2="324"/>
  <line class="iw" x1="335" y1="34" x2="335" y2="324"/>
  <line class="iw" x1="18" y1="205" x2="200" y2="205"/>
  <line class="iw" x1="200" y1="180" x2="335" y2="180"/>
  <line class="iw" x1="335" y1="130" x2="462" y2="130"/>
  <!-- windows -->
  <line class="win" x1="60" y1="34" x2="150" y2="34"/>
  <line class="win" x1="18" y1="100" x2="18" y2="150"/>
  <line class="win" x1="240" y1="34" x2="300" y2="34"/>
  <line class="win" x1="462" y1="180" x2="462" y2="240"/>
  <line class="win" x1="240" y1="324" x2="300" y2="324"/>
  <!-- doors -->
  <path class="door" d="M70 205 a24 24 0 0 1 24 -24"/>
  <path class="door" d="M200 150 a24 24 0 0 1 24 24"/>
  <path class="door" d="M335 100 a22 22 0 0 1 22 22"/>
  <path class="door" d="M260 180 a22 22 0 0 1 22 22"/>
  <!-- living -->
  <rect class="fur" x="34" y="150" width="110" height="32" rx="4"/>
  <circle class="fur" cx="110" cy="90" r="22"/>
  <!-- kitchen (bottom-left) -->
  <rect class="fur" x="28" y="215" width="150" height="16" rx="2"/>
  <rect class="fur" x="28" y="231" width="16" height="50" rx="2"/>
  <!-- bedroom 1 (top-mid) -->
  <rect class="fur" x="220" y="48" width="98" height="64" rx="4"/>
  <rect class="fur" x="225" y="52" width="42" height="14" rx="3"/>
  <rect class="fur" x="273" y="52" width="42" height="14" rx="3"/>
  <!-- bedroom 2 (bottom-mid) -->
  <rect class="fur" x="220" y="240" width="98" height="64" rx="4"/>
  <rect class="fur" x="225" y="244" width="42" height="14" rx="3"/>
  <rect class="fur" x="273" y="244" width="42" height="14" rx="3"/>
  <!-- bath (top-right) -->
  <rect class="fur" x="350" y="62" width="74" height="36" rx="6"/>
  <!-- bedroom 3 (bottom-right) -->
  <rect class="fur" x="352" y="150" width="96" height="62" rx="4"/>
  <rect class="fur" x="357" y="154" width="41" height="14" rx="3"/>
  <rect class="fur" x="404" y="154" width="41" height="14" rx="3"/>
  <!-- labels -->
  <text class="lab" x="100" y="125">Living</text>
  <text class="sz" x="100" y="139">29 m²</text>
  <text class="lab" x="105" y="268">Kitchen</text>
  <text class="lab" x="267" y="135">Bedroom 1</text>
  <text class="lab" x="267" y="290">Bedroom 2</text>
  <text class="lab" x="398" y="115">Bath</text>
  <text class="lab" x="400" y="245">Bedroom 3</text>
  <text class="ttl" x="18" y="24">3 BEDROOM</text>
</svg>
